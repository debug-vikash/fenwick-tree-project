<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register — Fenwick Tree Update Handler</title>
  <meta name="description" content="Create a new account for the Fenwick Tree Update Handler system." />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="page-wrapper">
    <!-- Project Header -->
    <div class="project-header">
      <div class="project-icon">🌳</div>
      <h1>Fenwick Tree Update Handler</h1>
      <p>Efficient Prefix Aggregation</p>
    </div>

    <!-- Registration Card -->
    <div class="card">
      <h2>Create Account</h2>
      <p class="subtitle">
        <span class="keyword">Register</span> to access the system
      </p>

      <form id="registerForm" novalidate>
        <div class="form-group">
          <label for="name">Full Name</label>
          <input type="text" id="name" name="name" placeholder="Enter your name" required />
        </div>

        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" name="email" placeholder="Enter your email" required />
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" placeholder="Create a password" required />
        </div>

        <div class="form-group">
          <label for="confirmPassword">Confirm Password</label>
          <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Confirm your password" required />
        </div>

        <button type="submit" class="btn-primary">Register</button>

        <div id="message" class="message"></div>
      </form>

      <div class="footer-link">
        Already have an account? <a href="login.html">Login here</a>
      </div>
    </div>
  </div>

  <script src="js/register.js"></script>
</body>
</html>
