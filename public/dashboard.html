<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard — Fenwick Tree Update Handler</title>
    <meta name="description" content="Dashboard for the Fenwick Tree Update Handler system." />
    <link rel="stylesheet" href="css/style.css" />
</head>

<body>
    <div class="page-wrapper">
        <!-- Project Header -->
        <div class="project-header">
            <div class="project-icon">🌳</div>
            <h1>Fenwick Tree Update Handler</h1>
            <p>Efficient Prefix Aggregation</p>
        </div>

        <!-- Dashboard Card -->
        <div class="card dashboard-card">
            <div class="welcome-icon">✓</div>
            <h2>Welcome!</h2>
            <p>You have successfully logged in to the system.</p>

            <div class="user-info" id="userInfo">
                <p><strong>Name:</strong> <span id="userName">—</span></p>
                <p><strong>Email:</strong> <span id="userEmail">—</span></p>
            </div>

            <p>
                You now have access to the
                <span class="keyword">Backend</span> system powered by
                <span class="keyword">Database</span> storage.
            </p>

            <a href="login.html" class="btn-secondary" id="logoutBtn">Logout</a>
        </div>
    </div>

    <script>
        // Display logged-in user info from localStorage
        document.addEventListener("DOMContentLoaded", () => {
            const user = JSON.parse(localStorage.getItem("user"));
            if (user) {
                document.getElementById("userName").textContent = user.name;
                document.getElementById("userEmail").textContent = user.email;
            }

            document.getElementById("logoutBtn").addEventListener("click", () => {
                localStorage.removeItem("user");
            });
        });
    </script>
</body>

</html>
