<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login — Fenwick Tree Update Handler</title>
    <meta name="description" content="Log in to the Fenwick Tree Update Handler system." />
    <link rel="stylesheet" href="css/style.css" />
</head>

<body>
    <div class="page-wrapper">
        <!-- Project Header -->
        <div class="project-header">
            <div class="project-icon">🌳</div>
            <h1>Fenwick Tree Update Handler</h1>
            <p>Efficient Prefix Aggregation</p>
        </div>

        <!-- Login Card -->
        <div class="card">
            <h2>Welcome Back</h2>
            <p class="subtitle">
                <span class="keyword">Login</span> to your account
            </p>

            <form id="loginForm" novalidate>
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" placeholder="Enter your email" required />
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="Enter your password" required />
                </div>

                <button type="submit" class="btn-primary">Login</button>

                <div id="message" class="message"></div>
            </form>

            <div class="footer-link">
                Don't have an account? <a href="register.html">Register here</a>
            </div>
        </div>
    </div>

    <script src="js/login.js"></script>
</body>

</html>
